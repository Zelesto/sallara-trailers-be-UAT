# ============================================================================
# APPLICATION.PROPERTIES - BASE CONFIGURATION
# Applies to ALL profiles
# ============================================================================

# Application
spring.application.name=trailers-backend

# Server (Render injects PORT)
server.port=${PORT:8081}

# ============================================================================
# Supabase S3 Configuration
# ============================================================================
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT}
supabase.s3.region=${SUPABASE_S3_REGION:eu-central-1}
supabase.s3.access-key-id=${SUPABASE_ACCESS_KEY}
supabase.s3.secret-access-key=${SUPABASE_SECRET_KEY}
supabase.s3.bucket=${SUPABASE_BUCKET:sallara_dev_pods}
supabase.url=${SUPABASE_URL}

# ============================================================================
# Banner
# ============================================================================
spring.banner.location=classpath:banner.txt

# ============================================================================
# Multipart Upload
# ============================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================================================
# Actuator
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# ============================================================================
# RestTemplate
# ============================================================================
rest.template.connect-timeout=5000
rest.template.read-timeout=30000

# ============================================================================
# JPA / Hibernate - OPTIMIZED FOR SUPABASE POSTGRESQL
# ============================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Disable schema validation to prevent connection issues
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ============================================================================
# Database - Supabase PostgreSQL (Using environment variables)
# ============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# HikariCP Connection Pool - OPTIMIZED FOR SUPABASE
# ============================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.register-mbeans=true

# ============================================================================
# Jackson
# ============================================================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ============================================================================
# Logging
# ============================================================================
logging.level.com.pgsa.trailers=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=INFO

# ============================================================================
# CORS (Override in profile-specific)
# ============================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================================================
# Security - JWT
# ============================================================================
security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================================
# External APIs
# ============================================================================
openrouteservice.api.url=${OPENROUTESERVICE_API_URL:https://api.openrouteservice.org}
openrouteservice.api.key=${OPENROUTESERVICE_API_KEY}

# ============================================================================
# Profile-specific configuration:
# - application-dev.properties
# - application-prod.properties
# ============================================================================
