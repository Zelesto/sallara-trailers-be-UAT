# ============================================================================
# APPLICATION.PROPERTIES - BASE CONFIGURATION
# Applies to ALL profiles
# ============================================================================

# Application
spring.application.name=trailers-backend

# Server (Render injects PORT)
server.port=${PORT:8081}

# Supabase S3 Configuration (Use placeholders or remove sensitive data)
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT:https://kmarxdcqinmolstnutal.storage.supabase.co/storage/v1/s3}
supabase.s3.region=${SUPABASE_S3_REGION:eu-central-1}
supabase.s3.access-key-id=${SUPABASE_ACCESS_KEY:}
supabase.s3.secret-access-key=${SUPABASE_SECRET_KEY:}
supabase.s3.bucket=${SUPABASE_BUCKET:sallara_dev_pods}
supabase.url=${SUPABASE_URL:https://kmarxdcqinmolstnutal.supabase.co}

# Banner
spring.banner.location=classpath:banner.txt

# Multipart Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# RestTemplate
rest.template.connect-timeout=5000
rest.template.read-timeout=30000

# External APIs (profile-overridable)
openrouteservice.api.url=https://api.openrouteservice.org

# ============================================================================
# Profile-specific configuration:
# - application-dev.properties
# - application-prod.properties
# ============================================================================
